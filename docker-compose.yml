name: histoire-interactive

services:
  postgres:
    image: postgres:17
    container_name: histoire_interactive_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: histoire_interactive_db
    ports:
      - "5432:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
